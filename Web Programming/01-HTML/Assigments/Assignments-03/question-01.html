<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html table Example</title>
</head>

<body>
    <h1 align="center">Student data table</h1>
    <br>
    <table border="5" align="center" cellpadding="10" cellspacing="5">
        <tr>
            <th rowspan="2">Student Name</th>
            <th colspan="10">Subjects</th>
            <th rowspan="2">Total Marks</th>
        </tr>
        <tr>
            <th>Science</th>
            <th>maths</th>
            <th>Hindi</th>
            <th>English</th>
        </tr>
        <tr>
            <th>chetan shinde</th>
            <th>80</th>
            <th>90</th>
            <th>99</th>
            <th>89</th>
            <th colspan="20">358</th>
        </tr>
        <tr>
            <th>vaibhav shinde</th>
            <th>80</th>
            <th>90</th>
            <th>99</th>
            <th>90</th>
            <th colspan="20">359</th>
        </tr>
    </table>
</body>

</html>
